<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login – NEU Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --neu-red: #c0392b; --neu-dark: #1a1a2e;
      --text-main: #1a1a2e; --text-muted: #6b7280;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh; display: flex; flex-direction: column;
    }
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      background: rgba(255,255,255,.06); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.10);
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-logo  { width: 38px; height: 38px; border-radius: 8px; background: #fff; padding: 3px; object-fit: contain; }
    .nav-title { color: #fff; font-weight: 600; font-size: 1rem; }
    .nav-back  {
      color: rgba(255,255,255,.7); text-decoration: none; font-size: .85rem;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-back:hover { color: #fff; }

    .main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,.18);
      width: 100%; max-width: 420px; overflow: hidden;
    }
    .card-banner {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 32px 24px; text-align: center;
    }
    .avatar-ring {
      width: 72px; height: 72px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
      background: rgba(255,255,255,.1);
    }
    .avatar-ring svg { color: rgba(255,255,255,.85); }
    .banner-title { color: #fff; font-family: 'Playfair Display', serif; font-size: 1.3rem; }
    .banner-sub { color: rgba(255,255,255,.5); font-size: .8rem; margin-top: 4px; }

    .card-body { padding: 28px 28px 32px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text-main); margin-bottom: 6px; }
    .card-subtitle { color: var(--text-muted); font-size: .88rem; margin-bottom: 24px; }

    /* Status messages */
    .msg-box {
      display: none; border-radius: 10px; padding: 12px 14px;
      font-size: .85rem; margin-bottom: 16px;
      align-items: center; gap: 10px;
    }
    .msg-box.error   { display: flex; background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
    .msg-box.success { display: flex; background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
    .msg-box.info    { display: flex; background: #eff6ff; border: 1px solid #93c5fd; color: #1d4ed8; }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: .83rem; font-weight: 600; color: var(--text-main); margin-bottom: 6px; letter-spacing: .3px; }
    .input-wrapper { position: relative; }
    .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #9ca3af; display: flex; }
    .form-input {
      width: 100%; padding: 12px 14px 12px 42px;
      border: 1.5px solid #e5e7eb; border-radius: 10px;
      font-family: inherit; font-size: .9rem; color: var(--text-main);
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .form-input:focus { border-color: #1a1a2e; box-shadow: 0 0 0 3px rgba(26,26,46,.08); }
    .form-input.input-error { border-color: #ef4444; }

    .info-note {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 12px 14px; font-size: .82rem; color: #64748b;
      margin-bottom: 20px; display: flex; gap: 8px; align-items: flex-start;
    }
    .info-note svg { flex-shrink: 0; margin-top: 1px; color: #3b82f6; }

    .proceed-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff; border: none; border-radius: 12px;
      font-family: inherit; font-size: .95rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; transition: opacity .2s, transform .15s;
      margin-bottom: 12px;
    }
    .proceed-btn:hover { opacity: .88; transform: translateY(-1px); }
    .proceed-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .divider { text-align: center; color: #9ca3af; font-size: .8rem; margin: 12px 0; position: relative; }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: #e5e7eb;
    }
    .divider::before { left: 0; } .divider::after { right: 0; }

    .google-btn {
      width: 100%; padding: 13px;
      background: #fff; color: #374151;
      border: 1.5px solid #e5e7eb; border-radius: 12px;
      font-family: inherit; font-size: .9rem; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background .2s, border-color .2s;
    }
    .google-btn:hover { background: #f9fafb; border-color: #d1d5db; }
    .google-btn:disabled { opacity: .5; cursor: not-allowed; }

    .back-link {
      display: block; text-align: center; margin-top: 16px;
      color: rgba(255,255,255,.55); font-size: .85rem; text-decoration: none;
    }
    .back-link:hover { color: #fff; }

    .footer {
      text-align: center; padding: 16px;
      color: rgba(255,255,255,.35); font-size: .78rem;
    }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <img src="neuLogo.png" alt="NEU Logo" class="nav-logo" />
      <span class="nav-title">NEU Library</span>
    </div>
    <a href="LandingPage.html" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
  </nav>

  <main class="main">
    <div class="card">
      <div class="card-banner">
        <div class="avatar-ring">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
          </svg>
        </div>
        <div class="banner-title">Student Login</div>
        <div class="banner-sub">NEU Library Visitor Log</div>
      </div>

      <div class="card-body">
        <h2 class="card-title">Welcome!</h2>
        <p class="card-subtitle">Sign in to log your library visit and track your sessions.</p>

        <!-- Status messages -->
        <div class="msg-box" id="msgBox">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" id="msgIcon"></svg>
          <span id="msgText"></span>
        </div>

        <!-- Email form -->
        <div class="form-group">
          <label class="form-label" for="gmail">Gmail Address</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <input type="email" id="gmail" class="form-input" placeholder="yourname@gmail.com" autocomplete="email"/>
          </div>
        </div>

        <button class="proceed-btn" id="enterBtn" onclick="handleEmailLogin()">
          <span id="enterBtnText">Enter Library</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

        <div class="divider">or</div>

        <button class="google-btn" id="googleBtn" onclick="handleGoogleLogin()">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 New Era University Library. All rights reserved.</p>
    <p style="margin-top:4px;letter-spacing:1.5px;font-size:.7rem;">Godliness is the foundation of knowlege</p>
  </footer>

  <!-- =============================================
       FIREBASE SDK  (v10 modular via CDN compat)
       ============================================= -->
  <script type="module">
    // ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────
    import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword }
                                                    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp }
                                                    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAGzGi9sm0nh-rccNKze_DYBGVb7nnIg1Q",
        authDomain: "neu-library-visitors-log.firebaseapp.com",
        projectId: "neu-library-visitors-log",
        storageBucket: "neu-library-visitors-log.firebasestorage.app",
        messagingSenderId: "473646406825",
        appId: "1:473646406825:web:dc1cb0abea173c43441db8",
        measurementId: "G-N5FG6LH948"
    };
    // ─────────────────────────────────────────────────────────────

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── HELPERS ──────────────────────────────────────────────────
    function showMsg(text, type = 'info') {
      const box  = document.getElementById('msgBox');
      const span = document.getElementById('msgText');
      box.className = `msg-box ${type}`;
      span.textContent = text;
    }
    function setLoading(loading) {
      const btn  = document.getElementById('enterBtn');
      const gBtn = document.getElementById('googleBtn');
      const txt  = document.getElementById('enterBtnText');
      btn.disabled  = loading;
      gBtn.disabled = loading;
      txt.textContent = loading ? 'Logging in…' : 'Enter Library';
    }

    // ── LOG STUDENT VISIT TO FIRESTORE ────────────────────────────
    async function logVisit(email, name) {
      // Store pending email so VisitorsPurpose page can retrieve it
      sessionStorage.setItem('studentEmail', email);
      sessionStorage.setItem('studentName', name || email.split('@')[0]);
      // Redirect to purpose page
      window.location.href = 'VisitorsPurpose.html';
    }

    // ── EMAIL LOGIN ───────────────────────────────────────────────
    window.handleEmailLogin = async function () {
      const email = document.getElementById('gmail').value.trim();
      if (!email || !email.includes('@')) {
        document.getElementById('gmail').classList.add('input-error');
        showMsg('Please enter a valid Gmail address.', 'error');
        return;
      }
      setLoading(true);
      try {
        // We use email-only (no password) for students — create anonymous session
        // Alternative: use passwordless email link (Firebase Email Link auth)
        // For simplicity here we just validate email format and redirect
        showMsg('Redirecting to purpose page…', 'success');
        setTimeout(() => logVisit(email, email.split('@')[0]), 800);
      } catch (e) {
        showMsg(e.message, 'error');
        setLoading(false);
      }
    };

    // ── GOOGLE LOGIN ──────────────────────────────────────────────
    window.handleGoogleLogin = async function () {
      setLoading(true);
      try {
        const provider = new GoogleAuthProvider();
        const result   = await signInWithPopup(auth, provider);
        const user     = result.user;
        showMsg(`Welcome, ${user.displayName}! Redirecting…`, 'success');
        setTimeout(() => logVisit(user.email, user.displayName), 800);
      } catch (e) {
        showMsg(e.message, 'error');
        setLoading(false);
      }
    };

    // clear error on input
    document.getElementById('gmail').addEventListener('input', function () {
      this.classList.remove('input-error');
      document.getElementById('msgBox').className = 'msg-box';
    });
  </script>

</body>
</html>
