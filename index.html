<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library Visitor Log</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neu-red:    #85544e;
      --neu-dark:   #262645;
      --neu-gold:   #f0c040;
      --card-bg:    #ffffff;
      --text-main:  #1a1a2e;
      --text-muted: #6b7280;
      --border:     #e5e7eb;
      --shadow:     0 8px 32px rgba(0,0,0,.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.10);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-logo  { width: 38px; height: 38px; border-radius: 8px; object-fit: contain; background: #fff; padding: 3px; }
    .nav-title { color: #fff; font-weight: 600; font-size: 1rem; letter-spacing: .3px; }
    .nav-actions { display: flex; gap: 8px; }
    .nav-btn {
      background: rgba(255,255,255,.12); border: none; border-radius: 8px;
      color: #fff; width: 38px; height: 38px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,.22); }

    /* MAIN */
    .main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 16px;
      gap: 28px;
    }

    .hero { text-align: center; }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      color: #fff; line-height: 1.15; margin-bottom: 10px;
    }
    .hero-subtitle { color: rgba(255,255,255,.65); font-size: .95rem; }

    /* CARD */
    .card {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: var(--shadow);
      width: 100%; max-width: 440px;
      overflow: hidden;
    }
    .card-banner {
      background: linear-gradient(135deg, var(--neu-red), #a93226);
      padding: 28px 24px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .banner-icon { display: flex; gap: 6px; color: rgba(255,255,255,.85); }
    .banner-label {
      color: rgba(255,255,255,.7); font-size: .7rem;
      letter-spacing: 2px; font-weight: 600;
    }
    .card-body { padding: 28px 28px 32px; }
    .card-title {
      font-family: 'Arial', ;
      font-size: 1.5rem; color: var(--text-main); margin-bottom: 6px;
    }
    .card-subtitle { color: var(--text-muted); font-size: .88rem; margin-bottom: 24px; }

    .login-options { display: flex; flex-direction: column; gap: 12px; }
    .login-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; border-radius: 12px;
      text-decoration: none; font-weight: 500; font-size: .95rem;
      transition: transform .15s, box-shadow .15s;
      cursor: pointer;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
    .login-btn--student {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
    }
    .login-btn--admin {
      background: linear-gradient(135deg, var(--neu-red), #a93226);
      color: #fff;
    }
    .btn-icon { display: flex; }
    .btn-text { flex: 1; }
    .btn-arrow { margin-left: auto; opacity: .7; display: flex; }

    /* FOOTER */
    .footer {
      text-align: center; padding: 20px 16px;
      color: rgba(255,255,255,.4); font-size: .78rem;
    }
    .footer-motto { font-size: .7rem; letter-spacing: 1.5px; margin-top: 4px; color: rgba(255,255,255,.3); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <img src="neuLogo.png" alt="NEU Logo" class="nav-logo" />
      <span class="nav-title">NEU Library</span>
    </div>
  </nav>

  <main class="main">
    <div class="hero">
      <h1 class="hero-title">NEU Library<br/>Visitor Log</h1>
      <p class="hero-subtitle">Welcome to New Era University Library</p>
    </div>
      <div class="card-body">
        <h2 class="card-title">Visitor Access</h2>
        <p class="card-subtitle">Please select your login type to proceed to the visitor log.</p>

        <div class="login-options">
          <a href="StudentLogin.html" class="login-btn login-btn--student">
            <span class="btn-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
              </svg>
            </span>
            <span class="btn-text">Login as Student</span>
            <span class="btn-arrow">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
              </svg>
            </span>
          </a>

          <a href="AdminLogin.html" class="login-btn login-btn--admin">
            <span class="btn-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
              </svg>
            </span>
            <span class="btn-text">Login as Admin</span>
            <span class="btn-arrow">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
              </svg>
            </span>
          </a>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 New Era University Library. All rights reserved.</p>
    <p class="footer-motto">Godliness is the foundation of knowledge</p>
  </footer>

</body>
</html>
